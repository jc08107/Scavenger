{% extends "base.html" %}

{% block content %}
<h2>Select&nbsp;Your&nbsp;Role</h2>
<form method="post">
    <fieldset>
        <legend>Choose&nbsp;a&nbsp;role:</legend>
        <label class="role-option">
            <input type="radio" name="role" value="player" required>
            Player
        </label>
        {% if judge_available %}
        <label class="role-option">
            <input type="radio" name="role" value="judge">
            Judge{% if judge_slots_available is defined and judge_slots_available > 0 %} ({{ judge_slots_available }} slot{% if judge_slots_available != 1 %}s{% endif %} left){% endif %}
        </label>
        {% elif judge_slots_available is defined and judge_slots_available == 0 %}
        <p class="role-note">All judge slots are filled.</p>
        {% endif %}
        {% if admin_available %}
        <label class="role-option">
            <input type="radio" name="role" value="admin">
            Admin
        </label>
        {% endif %}
    </fieldset>
    <button type="submit">Continue</button>
</form>
{% endblock %}
